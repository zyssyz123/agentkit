[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit"
version = "0.1.0"
description = "AgentKit core: protocols, runtime, event bus, plugin loader."
authors = [{ name = "The AgentKit Contributors" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["agent", "llm", "plugin", "framework"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "anyio>=4.3",
]

[project.urls]
Homepage = "https://github.com/agentkit-dev/agentkit"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit"]
