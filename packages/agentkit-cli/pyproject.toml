[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-cli"
version = "0.1.0"
description = "AgentKit command-line interface (init / run / elements / techniques)."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "agentkit>=0.1.0",
    "typer>=0.12",
    "rich>=13.7",
]

[project.scripts]
agentkit = "agentkit_cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_cli"]
