[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aglet"
version = "0.1.0a4"
description = "Aglet core: protocols, runtime, event bus, plugin loader."
authors = [{ name = "The Aglet Contributors" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["agent", "llm", "plugin", "framework"]
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "anyio>=4.3",
    # Used by aglet.loader.http (eagerly imported via aglet.__init__).
    # Upper-bound at 1.0 to avoid the current 1.0.devX pre-releases which
    # dropped the top-level httpx.AsyncClient attribute we rely on.
    "httpx>=0.27,<1.0",
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/zyssyz123/agentkit"
Repository = "https://github.com/zyssyz123/agentkit"
Issues = "https://github.com/zyssyz123/agentkit/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aglet"]
