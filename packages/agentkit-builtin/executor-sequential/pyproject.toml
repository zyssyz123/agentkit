[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-executor-sequential"
version = "0.1.0"
description = "AgentKit built-in executor: invoke ctx.plan.next_action against the ToolHost in series."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"executor.sequential" = "agentkit_builtin_executor_sequential:SequentialExecutor"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_executor_sequential"]
