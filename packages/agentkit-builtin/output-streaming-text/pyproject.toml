[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-output-streaming-text"
version = "0.1.0"
description = "AgentKit built-in output technique: stream the planner's final answer as text chunks."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"output.streaming_text" = "agentkit_builtin_output_streaming_text:StreamingTextOutput"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_output_streaming_text"]
