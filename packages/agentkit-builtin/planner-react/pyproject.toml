[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-planner-react"
version = "0.1.0"
description = "AgentKit ReAct planner — drives a function-calling LLM through Thought / Action / Observation."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"planner.react" = "agentkit_builtin_planner_react:ReactPlanner"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_planner_react"]
