[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-tool-http-openapi"
version = "0.1.0"
description = "AgentKit built-in tool technique: expose HTTP endpoints (described by OpenAPI / inline schema) as tools."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0", "httpx>=0.27"]

[project.entry-points."agentkit.techniques"]
"tool.http_openapi" = "agentkit_builtin_tool_http_openapi:HttpOpenApiTool"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_tool_http_openapi"]
