[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-safety-budget"
version = "0.1.0"
description = "AgentKit built-in safety technique: hard-fails when the run Budget is exceeded."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"safety.budget_only" = "agentkit_builtin_safety_budget:BudgetSafety"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_safety_budget"]
