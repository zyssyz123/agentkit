[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-planner-reflexion"
version = "0.1.0"
description = "AgentKit Reflexion planner: wrap a base planner with self-critique + retry."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"planner.reflexion" = "agentkit_builtin_planner_reflexion:ReflexionPlanner"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_planner_reflexion"]
