[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-model-litellm"
version = "0.1.0"
description = "AgentKit ModelProvider that routes to 100+ LLMs via the LiteLLM SDK."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0", "litellm>=1.51"]

[project.entry-points."agentkit.models"]
litellm = "agentkit_builtin_model_litellm:LiteLLMProvider"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_model_litellm"]
