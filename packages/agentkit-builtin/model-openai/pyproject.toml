[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-model-openai"
version = "0.1.0"
description = "AgentKit ModelProvider that talks to any OpenAI-compatible chat-completions endpoint."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0", "httpx>=0.27"]

[project.entry-points."agentkit.models"]
openai_compat = "agentkit_builtin_model_openai:OpenAICompatProvider"
openai = "agentkit_builtin_model_openai:OpenAICompatProvider"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_model_openai"]
