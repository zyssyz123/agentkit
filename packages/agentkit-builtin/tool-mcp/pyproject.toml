[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-tool-mcp"
version = "0.1.0"
description = "AgentKit Tool Technique that adopts MCP (Model Context Protocol) servers."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0", "mcp>=1.0"]

[project.entry-points."agentkit.techniques"]
"tool.mcp" = "agentkit_builtin_tool_mcp:McpTool"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_tool_mcp"]
