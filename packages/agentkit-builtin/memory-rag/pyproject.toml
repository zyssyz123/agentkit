[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-memory-rag"
version = "0.1.0"
description = "AgentKit RAG memory technique — LanceDB-backed vector recall with pluggable embedders."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0", "lancedb>=0.13", "pyarrow>=15"]

[project.entry-points."agentkit.techniques"]
"memory.rag" = "agentkit_builtin_memory_rag:RagMemory"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_memory_rag"]
