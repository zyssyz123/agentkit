[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-obs-jsonl"
version = "0.1.0"
description = "AgentKit built-in observability technique: write events to a per-run JSONL file."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"observability.jsonl" = "agentkit_builtin_obs_jsonl:JsonlObservability"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_obs_jsonl"]
