[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-model-mock"
version = "0.1.0"
description = "Deterministic mock ModelProvider for tests and CI."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.models"]
mock = "agentkit_builtin_model_mock:MockProvider"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_model_mock"]
