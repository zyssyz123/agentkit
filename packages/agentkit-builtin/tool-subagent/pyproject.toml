[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-tool-subagent"
version = "0.1.0"
description = "AgentKit tool technique that wraps another agent.yaml as a callable Tool — the multi-agent primitive."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"tool.subagent" = "agentkit_builtin_tool_subagent:SubAgentTool"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_tool_subagent"]
