[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-obs-console"
version = "0.1.0"
description = "AgentKit built-in observability technique: print every Event to stdout."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"observability.console" = "agentkit_builtin_obs_console:ConsoleObservability"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_obs_console"]
