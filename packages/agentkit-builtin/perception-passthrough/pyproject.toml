[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-perception-passthrough"
version = "0.1.0"
description = "AgentKit built-in perception technique: copy raw_input.text into parsed_input.query unchanged."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"perception.passthrough" = "agentkit_builtin_perception_passthrough:PassthroughPerception"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_perception_passthrough"]
