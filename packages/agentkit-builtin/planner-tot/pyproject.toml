[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-planner-tot"
version = "0.1.0"
description = "AgentKit Tree-of-Thoughts planner: explore N candidate answers in parallel, score them, return the best."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"planner.tot" = "agentkit_builtin_planner_tot:TreeOfThoughtsPlanner"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_planner_tot"]
