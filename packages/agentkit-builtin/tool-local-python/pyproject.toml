[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-tool-local-python"
version = "0.1.0"
description = "AgentKit built-in tool technique: register local Python callables as Tools."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"tool.local_python" = "agentkit_builtin_tool_local_python:LocalPythonTool"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_tool_local_python"]
