[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-builtin-planner-echo"
version = "0.1.0"
description = "AgentKit built-in planner: deterministic echo planner for tutorials and tests (no LLM)."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = ["agentkit>=0.1.0"]

[project.entry-points."agentkit.techniques"]
"planner.echo" = "agentkit_builtin_planner_echo:EchoPlanner"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_builtin_planner_echo"]
