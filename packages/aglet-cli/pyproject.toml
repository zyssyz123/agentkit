[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aglet-cli"
version = "0.1.0a6"
description = "Aglet command-line interface (init / run / elements / techniques)."
authors = [{ name = "The Aglet Contributors" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "aglet>=0.1.0a4",
    "typer>=0.12",
    "rich>=13.7",
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.scripts]
aglet = "aglet_cli.main:app"

[project.urls]
Homepage = "https://github.com/zyssyz123/agentkit"
Repository = "https://github.com/zyssyz123/agentkit"
Issues = "https://github.com/zyssyz123/agentkit/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aglet_cli"]
