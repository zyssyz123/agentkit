[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentkit-server"
version = "0.1.0"
description = "FastAPI + SSE HTTP server for the AgentKit runtime."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "agentkit>=0.1.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sse-starlette>=2.1",
]

[project.scripts]
agentkit-serve = "agentkit_server.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit_server"]
