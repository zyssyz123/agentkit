[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aglet-builtin-safety-budget"
version = "0.1.0a1"
description = "Aglet built-in safety technique: hard-fails when the run Budget is exceeded."
authors = [{ name = "The Aglet Contributors" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["aglet>=0.1.0a1"]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.entry-points."aglet.techniques"]
"safety.budget_only" = "aglet_builtin_safety_budget:BudgetSafety"

[project.urls]
Homepage = "https://github.com/zyssyz123/agentkit"
Repository = "https://github.com/zyssyz123/agentkit"
Issues = "https://github.com/zyssyz123/agentkit/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aglet_builtin_safety_budget"]
