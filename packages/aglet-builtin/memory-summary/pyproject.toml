[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aglet-builtin-memory-summary"
authors = [{ name = "The Aglet Contributors" }]
license = "Apache-2.0"
readme = "README.md"
version = "0.1.0a1"
description = "Aglet memory technique: rolling LLM-summarised history for long conversations."
requires-python = ">=3.11"
dependencies = ["aglet>=0.1.0a2"]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.entry-points."aglet.techniques"]
"memory.summary" = "aglet_builtin_memory_summary:SummaryMemory"

[project.urls]
Homepage = "https://github.com/zyssyz123/agentkit"
Repository = "https://github.com/zyssyz123/agentkit"
Issues = "https://github.com/zyssyz123/agentkit/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aglet_builtin_memory_summary"]
